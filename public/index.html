<!doctype html>
<html lang="de" data-accent="purple" data-fontpair="editorial">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Anna-Lena Czarnetzki · Aromaberatung</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg); color: var(--fg-1); }
  body { font-family: var(--font-body); }
  a { color: inherit; }
  *:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; border-radius: 6px; }

  /* ============ Akzent-Themen ============================================
     Die Tweaks ändern --brand / --accent-strong etc. live über data-accent.
     Defaults bleiben Sage/Purple/Gold-Mix aus dem Design-System. */

  :root {
    --accent-strong: var(--gold-500);
    --ink-300: var(--ink-400);
  }
  [data-accent="purple"] {
    --brand: var(--purple-500);
    --brand-hover: var(--purple-600);
    --brand-soft: var(--purple-50);
    --bg-tinted: var(--purple-50);
    --link: var(--purple-600);
    --link-hover: var(--purple-700);
    --focus-ring: var(--purple-400);
    --accent-strong: var(--gold-500);
  }
  [data-accent="sage"] {
    /* Sage selbst gibts im Design-System nicht – wir leiten warm-grün aus oklch ab */
    --brand: oklch(45% 0.06 150);
    --brand-hover: oklch(38% 0.07 150);
    --brand-soft: oklch(96% 0.025 150);
    --bg-tinted: oklch(96% 0.025 150);
    --link: oklch(40% 0.06 150);
    --link-hover: oklch(32% 0.07 150);
    --focus-ring: oklch(60% 0.08 150);
    --accent-strong: var(--gold-500);
  }
  [data-accent="clay"] {
    --brand: oklch(50% 0.11 38);
    --brand-hover: oklch(42% 0.12 38);
    --brand-soft: oklch(95% 0.03 38);
    --bg-tinted: oklch(95% 0.03 38);
    --link: oklch(45% 0.11 38);
    --link-hover: oklch(38% 0.12 38);
    --focus-ring: oklch(60% 0.12 38);
    --accent-strong: oklch(55% 0.13 50);
  }
  [data-accent="gold"] {
    --brand: var(--gold-600);
    --brand-hover: var(--gold-700);
    --brand-soft: var(--gold-50);
    --bg-tinted: var(--gold-50);
    --link: var(--gold-700);
    --link-hover: var(--ink-800);
    --focus-ring: var(--gold-400);
    --accent-strong: var(--purple-500);
  }

  /* ============ Schriftpaarungen ========================================= */
  [data-fontpair="classic"] {
    --font-display: 'Cormorant Garamond', Garamond, serif;
    --font-body: 'Nunito Sans', system-ui, sans-serif;
  }
  [data-fontpair="modern"] {
    --font-display: 'Fraunces', 'Cormorant Garamond', serif;
    --font-body: 'Inter', 'Nunito Sans', system-ui, sans-serif;
  }
  [data-fontpair="editorial"] {
    --font-display: 'DM Serif Display', 'Cormorant Garamond', serif;
    --font-body: 'Work Sans', 'Nunito Sans', system-ui, sans-serif;
  }

  /* responsive grids – keep things readable on small screens */
  @media (max-width: 880px) {
    section [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
    footer [style*="grid-template-columns"] { grid-template-columns: 1fr 1fr !important; gap: 32px !important; }
    /* prevent any element from forcing horizontal scroll on phones */
    img, svg { max-width: 100%; height: auto; }
  }
  @media (max-width: 560px) {
    footer [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
    /* a touch more text width on narrow phones */
    section { padding-left: 20px !important; padding-right: 20px !important; }
    /* roomier card interiors */
    [style*="40px 36px"] {
      padding: 28px 22px !important;
    }
  }
</style>

<!-- Optionale Webfonts für die Schriftpaarungen -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=DM+Serif+Display&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- Design-system icons -->
<script type="text/babel" src="ds-icon.jsx"></script>

<!-- Shared page-hero with image -->
<script type="text/babel" src="page-hero.jsx"></script>

<!-- UI-Kit Bausteine -->
<script type="text/babel" src="ui_kits/website/SiteFooter.jsx"></script>
<script type="text/babel" src="ui_kits/website/BookingModal.jsx"></script>
<script type="text/babel" src="ui_kits/website/AboutPage.jsx"></script>
<script type="text/babel" src="ui_kits/website/BeratungPage.jsx"></script>

<!-- Eigene Homepage-Sektionen -->
<script type="text/babel" src="homepage-hero.jsx"></script>
<script type="text/babel" src="homepage-uebersicht.jsx"></script>
<script type="text/babel" src="homepage-band.jsx"></script>
<script type="text/babel" src="homepage-teaser.jsx"></script>
<script type="text/babel" src="homepage-cta.jsx"></script>
<script type="text/babel" src="homepage-kontakt.jsx"></script>
<script type="text/babel" src="stub-pages.jsx"></script>
<script type="text/babel" src="allgemein-kapitel.jsx"></script>
<script type="text/babel" src="allgemein-page.jsx"></script>
<script type="text/babel" src="familie-page.jsx"></script>
<script type="text/babel" src="hund-page.jsx"></script>
<script type="text/babel" src="pferde-page.jsx"></script>
<script type="text/babel" src="weg-page.jsx"></script>
<script type="text/babel" src="legal-pages.jsx"></script>

<script type="text/babel">
function HomePage({ onBook, setPage }) {
  return (
    <div data-screen-label="01 Willkommen">
      <HomepageHero onBook={onBook}
                    onAbout={()=>{setPage('about'); window.scrollTo({top:0});}}
                    layout="typo-first"
                    headline="Schön, dass du da bist."
                    showImage={true}
                    showDiplom={false}/>
      <HomepageUebersicht setPage={setPage}/>
      <HomepageBand/>
      <HomepageTeaser setPage={setPage}/>
      <HomepageCTA onBook={onBook}/>
      <HomepageKontakt onBook={onBook}/>
    </div>
  );
}

function App() {
  const initial = (typeof location !== 'undefined' && location.hash.replace('#','')) || 'home';
  const validPages = ['home','allgemein','familie','hund','pferde','about','weg','beratung','impressum'];
  const [page, setPage] = React.useState(validPages.includes(initial) ? initial : 'home');
  const [booking, setBooking] = React.useState(false);
  React.useEffect(() => { location.hash = page; }, [page]);

  const onBook = () => setBooking(true);

  return (
    <React.Fragment>
      <CustomHeader page={page} setPage={setPage} onBook={onBook}/>
      <main>
        {page==='home' && <HomePage onBook={onBook} setPage={setPage}/>}
        {page==='allgemein' && <AllgemeinPage onBook={onBook}/>}
        {page==='familie' && <FamiliePage onBook={onBook}/>}
        {page==='hund' && <HundPage onBook={onBook}/>}
        {page==='pferde' && <PferdePage onBook={onBook}/>}
        {page==='about' && <AboutPage onBook={onBook}/>}
        {page==='weg' && <WegPage onBook={onBook}/>}
        {page==='beratung' && <BeratungPage onBook={onBook}/>}
        {page==='impressum' && <ImpressumPage/>}
      </main>
      <SiteFooter setPage={setPage} onBook={onBook}/>
      <BookingModal open={booking} onClose={()=>setBooking(false)}/>
    </React.Fragment>
  );
}

// ── Custom Header — derived from kit but adds 'Home' tab ──────────────────
function CustomHeader({ page, setPage, onBook }) {
  const [scrolled, setScrolled] = React.useState(false);
  const [isMobile, setIsMobile] = React.useState(
    typeof window !== 'undefined' && window.innerWidth <= 880);
  const [menuOpen, setMenuOpen] = React.useState(false);
  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 8);
    const onResize = () => setIsMobile(window.innerWidth <= 880);
    window.addEventListener('scroll', onScroll);
    window.addEventListener('resize', onResize);
    return () => {
      window.removeEventListener('scroll', onScroll);
      window.removeEventListener('resize', onResize);
    };
  }, []);
  // Leaving mobile width closes the drawer so it can't get stuck open.
  React.useEffect(() => { if (!isMobile) setMenuOpen(false); }, [isMobile]);

  const links = [
    ['home', 'Willkommen'],
    ['allgemein', 'Ätherische Öle'],
    ['familie', 'Familie'],
    ['hund', 'Hund'],
    ['pferde', 'Pferd'],
    ['about', 'Über mich'],
    ['weg', 'Der Weg zu den Ölen'],
  ];
  const go = (key) => { setPage(key); setMenuOpen(false); window.scrollTo({top:0}); };

  const navLink = (key, label) => (
    <a key={key} href={'#'+key} onClick={(e)=>{e.preventDefault(); go(key);}} style={{
      fontFamily: 'var(--font-body)', fontSize: isMobile ? 17 : 14, fontWeight: 500,
      color: page===key ? 'var(--brand)' : 'var(--ink-700)',
      textDecoration: 'none', position: 'relative',
      paddingBottom: isMobile ? 6 : 4,
      borderBottom: (!isMobile && page===key)
        ? '1.5px solid var(--accent-strong)' : '1.5px solid transparent',
      letterSpacing:'0.01em',
    }}>{label}</a>
  );

  const solidBg = scrolled || menuOpen;

  return (
    <header style={{
      position: 'sticky', top: 0, zIndex: 40,
      backdropFilter: 'blur(12px) saturate(1.2)',
      WebkitBackdropFilter: 'blur(12px) saturate(1.2)',
      background: solidBg ? 'rgba(250, 246, 239, 0.94)' : 'rgba(250, 246, 239, 0)',
      borderBottom: solidBg ? '1px solid var(--mist-300)' : '1px solid transparent',
      transition: 'all 250ms var(--ease-standard)',
    }}>
      <div style={{
        maxWidth: 1240, margin: '0 auto', height: isMobile ? 64 : 76,
        padding: isMobile ? '0 20px' : '0 32px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <a href="#home" onClick={(e)=>{e.preventDefault(); go('home');}}
           style={{ display: 'flex', alignItems: 'center', gap: isMobile ? 11 : 14, textDecoration: 'none', minWidth: 0 }}>
          <img src="assets/seal-gold.png" alt="Anna-Lena Czarnetzki · Aromaberaterin, Sozialarbeiterin, Krankenschwester"
               style={{
                 width: isMobile ? 44 : 56, height: isMobile ? 44 : 56, borderRadius: 999,
                 background: 'var(--bg-warm)',
                 padding: 2,
                 boxShadow: 'var(--shadow-sm)',
                 flexShrink: 0,
               }}/>
          <div style={{display:'flex', flexDirection:'column', lineHeight:1.1, minWidth: 0}}>
            <span style={{
              fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: isMobile ? 17 : 20,
              color: 'var(--ink-900)', letterSpacing: '-0.005em',
            }}>Anna-Lena Czarnetzki</span>
            <span style={{
              fontFamily: 'var(--font-body)', fontWeight: 600, fontSize: 10,
              color: 'var(--accent-strong)', letterSpacing: '0.22em', textTransform:'uppercase',
              marginTop: 3,
            }}>Aromaberatung</span>
          </div>
        </a>

        {isMobile ? (
          <button onClick={()=>setMenuOpen(o=>!o)} aria-label="Menü" aria-expanded={menuOpen}
                  style={{
                    display:'flex', alignItems:'center', justifyContent:'center',
                    width:44, height:44, flexShrink:0, marginRight:-8,
                    background:'transparent', border:'none', cursor:'pointer',
                    color:'var(--ink-900)',
                  }}>
            {menuOpen ? (
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   strokeWidth="2" strokeLinecap="round">
                <line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/>
              </svg>
            ) : (
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   strokeWidth="2" strokeLinecap="round">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
              </svg>
            )}
          </button>
        ) : (
          <nav style={{ display: 'flex', gap: 24, alignItems: 'center' }}>
            {links.map(([k,l]) => navLink(k,l))}
            <button onClick={onBook} style={{
              fontFamily: 'var(--font-body)', fontWeight: 600, fontSize: 14,
              color: 'var(--cream-50)', background: 'var(--brand)',
              border: 'none', padding: '10px 22px', borderRadius: 999, cursor: 'pointer',
            }}>Termin</button>
          </nav>
        )}
      </div>

      {isMobile && menuOpen && (
        <nav style={{
          display:'flex', flexDirection:'column', gap: 4,
          padding: '12px 20px 24px',
          background: 'rgba(250, 246, 239, 0.98)',
          borderTop: '1px solid var(--mist-200)',
        }}>
          {links.map(([k,l]) => (
            <div key={k} style={{padding:'10px 0', borderBottom:'1px solid var(--mist-200)'}}>
              {navLink(k,l)}
            </div>
          ))}
          <button onClick={()=>{ setMenuOpen(false); onBook(); }} style={{
            marginTop: 18,
            fontFamily: 'var(--font-body)', fontWeight: 600, fontSize: 16,
            color: 'var(--cream-50)', background: 'var(--brand)',
            border: 'none', padding: '14px 22px', borderRadius: 999, cursor: 'pointer',
          }}>Termin vereinbaren</button>
        </nav>
      )}
    </header>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
